<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquadDFC - Gestão Financeira</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Chart.js para Gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background-color: #0a0a0a; color: #e5e7eb; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .hidden { display: none !important; }
        
        /* Animações Premium */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-scale-in { animation: scaleIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="antialiased">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="min-h-screen bg-[#0a0a0a] flex flex-col items-center justify-center p-4 transition-opacity duration-500">
        <div class="w-full max-w-md bg-[#141414] border border-[#2a2a2a] rounded-2xl p-8 shadow-2xl animate-scale-in">
            <div class="flex justify-center mb-8">
                <div class="w-16 h-16 bg-red-600 rounded-xl flex items-center justify-center font-bold text-white text-3xl shadow-lg shadow-red-600/20 transition-transform hover:scale-105">S</div>
            </div>
            <h1 class="text-3xl font-bold text-center text-white mb-2">SQUAD<span class="text-red-500">DFC</span></h1>
            <p class="text-gray-400 text-center mb-8">Gestão Financeira e de Projetos</p>
            
            <div id="login-form-container" class="space-y-4">
                <div id="name-field" class="hidden animate-fade-in">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Nome Completo</label>
                    <input type="text" id="login-name" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-3 text-white focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all outline-none" placeholder="Como quer ser chamado?" />
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">E-mail</label>
                    <input type="email" id="login-email" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-3 text-white focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all outline-none" placeholder="seu@email.com" />
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Senha</label>
                    <input type="password" id="login-password" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-3 text-white focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all outline-none" placeholder="••••••••" />
                </div>
                
                <div id="login-error" class="text-red-500 text-xs font-medium text-center hidden bg-red-500/10 border border-red-500/20 rounded p-3 animate-fade-in"></div>
                
                <button id="btn-action" type="button" onclick="window.appActions.handleEmailAuth()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition-all shadow-lg shadow-red-900/30 flex justify-center items-center h-12 hover:scale-[1.02]">
                    Entrar
                </button>
                
                <div class="text-center text-sm text-gray-400 mt-2">
                    <span id="toggle-auth-text">Não tem uma conta?</span>
                    <button type="button" onclick="window.appActions.toggleAuthMode()" class="text-red-500 hover:text-red-400 font-medium ml-1 transition-colors">Criar conta</button>
                </div>

                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-[#333]"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-500 text-xs">OU</span>
                    <div class="flex-grow border-t border-[#333]"></div>
                </div>

                <button id="btn-google" type="button" onclick="window.appActions.loginWithGoogle()" class="w-full bg-white text-black font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-200 transition-all h-12 hover:scale-[1.02]">
                    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span>Entrar com Google</span>
                </button>

                <button id="btn-guest" type="button" onclick="window.appActions.loginAnonymously()" class="w-full bg-[#1a1a1a] border border-[#333] text-gray-300 font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-3 hover:bg-[#2a2a2a] transition-all h-12 mt-3 hover:scale-[1.02]">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span>Acesso Rápido (Visitante)</span>
                </button>
            </div>
        </div>
    </div>

    <!-- TELA PRINCIPAL (APP) -->
    <div id="app-screen" class="hidden min-h-screen bg-[#0a0a0a] text-gray-200 flex flex-col md:flex-row transition-opacity duration-500">
        
        <!-- Overlay Mobile Sidebar -->
        <div id="sidebar-overlay" onclick="window.appActions.toggleMobileMenu()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

        <!-- Sidebar Responsiva -->
        <nav id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out z-50 w-64 bg-[#141414] border-r border-[#2a2a2a] flex flex-col justify-between h-screen">
            <div class="flex flex-col w-full h-full">
                <div class="flex p-6 items-center justify-between border-b border-[#2a2a2a]">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-bold text-white shadow-lg shadow-red-600/20">S</div>
                        <span class="text-xl font-bold tracking-wider text-white">SQUAD<span class="text-red-500">DFC</span></span>
                    </div>
                    <button onclick="window.appActions.toggleMobileMenu()" class="md:hidden text-gray-400 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                
                <!-- Info Usuário Logado (Sidebar) -->
                <div class="p-4 border-b border-[#2a2a2a] bg-[#1a1a1a] flex items-center gap-3 cursor-pointer hover:bg-[#222] transition-colors" onclick="window.appActions.changeTab('profile')">
                    <img id="sidebar-avatar-img" class="w-10 h-10 rounded-full border-2 border-red-500 object-cover hidden" src="" alt="Avatar" />
                    <div id="sidebar-avatar-initial" class="w-10 h-10 rounded-full bg-red-900/50 border-2 border-red-500 flex items-center justify-center font-bold text-red-200">U</div>
                    <div class="overflow-hidden">
                        <p id="sidebar-user-name" class="text-sm font-bold text-white truncate">Usuário</p>
                        <p class="text-xs text-red-400">Ver Perfil</p>
                    </div>
                </div>

                <div class="flex flex-col w-full justify-start mt-4 p-4 gap-2 overflow-y-auto" id="nav-menu">
                    <!-- Nav items renderizados via JS -->
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 h-screen overflow-y-auto relative flex flex-col">
            <header class="bg-[#141414]/95 backdrop-blur-md border-b border-[#2a2a2a] p-4 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center gap-3">
                    <button onclick="window.appActions.toggleMobileMenu()" class="md:hidden text-gray-400 hover:text-white transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h1 id="header-title" class="text-xl font-semibold text-white capitalize hidden sm:block">Dashboard</h1>
                </div>
                
                <div class="flex items-center gap-4">
                    <span id="user-greeting" class="text-sm font-medium text-gray-300 hidden md:block"></span>
                    <input type="month" id="selected-month" class="bg-[#0a0a0a] border border-[#333] rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-red-500 transition-colors shadow-inner" />
                </div>
            </header>

            <div class="p-4 md:p-8 flex-1" id="tab-content">
                <!-- Conteúdo das abas renderizado via JS -->
            </div>
        </main>
    </div>

    <!-- MODAIS (Pop-ups) -->
    <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity">
        
        <!-- Modal Cliente -->
        <div id="modal-client" class="hidden bg-[#141414] border border-[#333] rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl flex-col animate-scale-in">
            <!-- (Conteúdo do Modal Cliente Mantido e Otimizado para UI) -->
            <div class="p-6 border-b border-[#2a2a2a] flex justify-between items-center sticky top-0 bg-[#141414]/95 backdrop-blur z-10">
                <h2 id="client-modal-title" class="text-2xl font-bold text-white">Novo Cliente</h2>
                <button onclick="window.appActions.closeModal()" class="p-2 text-gray-400 hover:text-red-500 bg-[#2a2a2a] rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 flex-1">
                <div class="space-y-4">
                    <input type="hidden" id="client-id" />
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Nome do Cliente</label>
                        <input type="text" id="client-name" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none transition-colors" />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Fase</label>
                            <select id="client-phase" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none transition-colors">
                                <option value="Tratativa">Tratativa</option>
                                <option value="Implementação">Implementação</option>
                                <option value="Manutenção">Manutenção</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Status</label>
                            <select id="client-status" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none transition-colors">
                                <option value="Ativo">Ativo</option>
                                <option value="Churn">Churn</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Fornecedor</label>
                            <input type="text" id="client-supplier" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none transition-colors" />
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Sistema</label>
                            <input type="text" id="client-system" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none transition-colors" />
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Tipo de Serviço</label>
                        <input type="text" id="client-serviceType" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none transition-colors" />
                    </div>

                    <!-- Atribuição de Equipe -->
                    <div class="grid grid-cols-2 gap-4 mt-4 p-4 border border-[#333] rounded-lg bg-[#0a0a0a]">
                        <div class="col-span-2"><label class="block text-xs font-medium text-red-500 mb-1 uppercase tracking-wider">Responsável (Equipe)</label></div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Integrante</label>
                            <select id="client-assignedMemberId" class="w-full bg-[#141414] border border-[#333] rounded p-2 text-white focus:border-red-500 focus:outline-none transition-colors">
                                <option value="">Nenhum</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">% Atribuída</label>
                            <input type="number" min="0" max="100" id="client-memberPercentage" value="100" class="w-full bg-[#141414] border border-[#333] rounded p-2 text-white focus:border-red-500 focus:outline-none transition-colors" />
                        </div>
                    </div>
                </div>

                <div class="space-y-4 bg-[#1a1a1a] p-5 rounded-xl border border-[#2a2a2a]">
                    <h3 class="text-sm font-bold text-red-500 mb-4 border-b border-[#333] pb-2">Dados Financeiros</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Valor Recorrente (MRR)</label>
                            <div class="relative w-full">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                                <input type="text" id="client-recurringValue" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2 pl-9 text-white focus:border-red-500 focus:outline-none transition-colors" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Margem (Auto)</label>
                            <div id="client-recurringMargin" class="w-full bg-[#0a0a0a]/50 border border-[#333] rounded p-2 text-emerald-400 font-mono">R$ 0,00</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Valor One Time</label>
                            <div class="relative w-full">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                                <input type="text" id="client-oneTimeValue" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2 pl-9 text-white focus:border-red-500 focus:outline-none transition-colors" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Margem (Auto)</label>
                            <div id="client-oneTimeMargin" class="w-full bg-[#0a0a0a]/50 border border-[#333] rounded p-2 text-emerald-400 font-mono">R$ 0,00</div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-[#333]">
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Data de Entrega</label>
                        <input type="date" id="client-deliveryDate" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2 text-white focus:border-red-500 focus:outline-none transition-colors" style="color-scheme: dark;" />
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Nota NPS</label>
                        <input type="number" max="10" min="0" id="client-nps" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2 text-white focus:border-red-500 focus:outline-none transition-colors" />
                    </div>
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Observações / Motivo Churn</label>
                    <textarea id="client-observation" rows="3" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-3 text-white focus:border-red-500 focus:outline-none resize-none transition-colors"></textarea>
                </div>
            </div>
            <div class="p-6 border-t border-[#2a2a2a] bg-[#141414] flex justify-end gap-3 sticky bottom-0 z-10">
                <button onclick="window.appActions.closeModal()" class="px-5 py-2 rounded-lg font-medium text-gray-400 hover:text-white hover:bg-[#2a2a2a] transition-colors">Cancelar</button>
                <button onclick="window.appActions.saveClient()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-2 rounded-lg font-bold transition-transform shadow-lg shadow-red-900/30 hover:scale-105">Salvar Cliente</button>
            </div>
        </div>

        <!-- Modal Team -->
        <div id="modal-team" class="hidden bg-[#141414] border border-[#333] rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex-col animate-scale-in">
            <div class="p-6 border-b border-[#2a2a2a] flex justify-between items-center">
                <h2 id="team-modal-title" class="text-xl font-bold text-white">Novo Integrante</h2>
                <button onclick="window.appActions.closeModal()" class="p-2 text-gray-400 hover:text-red-500 bg-[#2a2a2a] rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="team-id" />
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Nome Completo</label>
                    <input type="text" id="team-name" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none transition-colors" />
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Cargo / Função</label>
                    <input type="text" id="team-role" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none transition-colors" />
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Custo Fixo Mensal (R$)</label>
                    <div class="relative w-full">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                        <input type="text" id="team-cost" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 pl-9 text-white focus:border-red-500 focus:outline-none transition-colors" />
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-[#2a2a2a] bg-[#1a1a1a] flex justify-end gap-3">
                <button onclick="window.appActions.closeModal()" class="px-5 py-2 rounded-lg font-medium text-gray-400 hover:text-white hover:bg-[#2a2a2a] transition-colors">Cancelar</button>
                <button onclick="window.appActions.saveTeam()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-2 rounded-lg font-bold transition-transform shadow-lg shadow-red-900/30 hover:scale-105">Salvar</button>
            </div>
        </div>

        <!-- Modal History -->
        <div id="modal-history" class="hidden bg-[#141414] border border-[#333] rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex-col animate-scale-in">
            <div class="p-6 border-b border-[#2a2a2a] flex justify-between items-center">
                <h2 id="history-modal-title" class="text-xl font-bold text-white">Adicionar Mês ao Histórico</h2>
                <button onclick="window.appActions.closeModal()" class="p-2 text-gray-400 hover:text-red-500 bg-[#2a2a2a] rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Mês de Referência</label>
                    <input type="month" id="history-month" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none disabled:opacity-50 transition-colors" />
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">MRR Bruto (R$)</label>
                        <div class="relative w-full">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                            <input type="text" id="history-mrr" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 pl-9 text-white focus:border-red-500 focus:outline-none transition-colors" />
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-red-500 mb-1 uppercase tracking-wider">Margem MC (R$)</label>
                        <div class="relative w-full">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                            <input type="text" id="history-margin" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 pl-9 text-white border-red-500/30 focus:border-red-500 focus:outline-none transition-colors" />
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Custos Totais</label>
                    <div class="relative w-full">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                        <input type="text" id="history-cost" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 pl-9 text-white focus:border-red-500 focus:outline-none transition-colors" />
                    </div>
                </div>
            </div>

                <button onclick="window.appActions.saveHistory()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-2 rounded-lg font-bold transition-transform shadow-lg shadow-red-900/30 hover:scale-105">Salvar Histórico</button>
            </div>

    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';

        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, query, addDoc, updateDoc, deleteDoc, where } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Configuração do Firebase
        const fallbackConfig = {
            apiKey: "AIzaSyDML8GP1iSR92I-07L3cUhe9B3AwIuuQnM",
            authDomain: "squaddfc-a7f0e.firebaseapp.com",
            projectId: "squaddfc-a7f0e",
            storageBucket: "squaddfc-a7f0e.firebasestorage.app",
            messagingSenderId: "952471267384",
            appId: "1:952471267384:web:f253bc3a4e141a80b61ecd"
        };
        
        let firebaseConfig = fallbackConfig;
        if (typeof __firebase_config !== 'undefined') {
            try {
                const parsed = JSON.parse(__firebase_config);
                if (parsed.apiKey) firebaseConfig = parsed;
            } catch(e) { console.warn("Usando configuração fallback"); }
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'squaddfc-a7f0e';

        // Estado Global
        const state = {
            user: null,
            activeTab: 'dashboard',
            clients: [], transactions: [], team: [], closures: [],
            selectedMonth: (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; })(),
            clientFilter: 'Todos',
            isSignUpMode: false,
            chartInstance: null
        };

        // Utilitários Financeiros
        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
        const formatNumberToBR = (val) => (Number(val) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const calcMargin = (val) => val ? (val * 0.7075) * 0.35 : 0;

        // Máscaras de Moeda
        function setupCurrencyMasks() {
            document.querySelectorAll('.currency-mask').forEach(input => {
                // Previne múltiplos listeners
                const newInp = input.cloneNode(true);
                input.parentNode.replaceChild(newInp, input);
                
                newInp.addEventListener('input', (e) => {
                    let val = e.target.value.replace(/\D/g, '');
                    if (val === '') { 
                        e.target.dataset.value = 0; e.target.value = ''; 
                    } else {
                        let num = Number(val) / 100;
                        e.target.dataset.value = num;
                        e.target.value = formatNumberToBR(num);
                    }
                    if(newInp.id === 'client-recurringValue') document.getElementById('client-recurringMargin').innerText = formatCurrency(calcMargin(Number(newInp.dataset.value)));
                    if(newInp.id === 'client-oneTimeValue') document.getElementById('client-oneTimeMargin').innerText = formatCurrency(calcMargin(Number(newInp.dataset.value)));
                });
            });
        }
        function setCurrencyInput(id, value) {
            const el = document.getElementById(id);
            if(el) { el.dataset.value = value || 0; el.value = formatNumberToBR(value); }
        }
        function getCurrencyInput(id) {
            const el = document.getElementById(id);
            return el ? Number(el.dataset.value || 0) : 0;
        }

        // Sistema de Renderização de Menu
        function renderNav() {
            const tabs = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
                { id: 'clients', icon: 'users', label: 'Clientes' },
                { id: 'team', icon: 'briefcase', label: 'Equipe' },
                { id: 'closure', icon: 'calculator', label: 'Fechamento' },
                { id: 'history', icon: 'history', label: 'Histórico Anual' },
                { id: 'profile', icon: 'user', label: 'Meu Perfil' }
            ];
            document.getElementById('nav-menu').innerHTML = tabs.map(t => `
                <button onclick="window.appActions.changeTab('${t.id}')" class="flex items-center gap-3 w-full p-3 rounded-lg transition-all duration-300 ${state.activeTab === t.id ? 'bg-red-600 text-white font-medium shadow-lg shadow-red-900/20 translate-x-1' : 'text-gray-400 hover:bg-[#2a2a2a] hover:text-white hover:translate-x-1'}">
                    <i data-lucide="${t.icon}" class="w-5 h-5"></i><span class="md:block">${t.label}</span>
                </button>
            `).join('');
            document.getElementById('header-title').innerText = tabs.find(t => t.id === state.activeTab).label;
        }

        function renderContent() {
            const content = document.getElementById('tab-content');
            if (state.activeTab === 'dashboard') { content.innerHTML = getDashboardHTML(); setTimeout(renderChart, 100); }
            if (state.activeTab === 'clients') content.innerHTML = getClientsHTML();
            if (state.activeTab === 'team') content.innerHTML = getTeamHTML();
            if (state.activeTab === 'closure') content.innerHTML = getClosureHTML();
            if (state.activeTab === 'history') content.innerHTML = getHistoryHTML();
            if (state.activeTab === 'profile') content.innerHTML = getProfileHTML();
            lucide.createIcons();
        }

        function updateApp() {
            renderNav();
            renderContent();
            setupCurrencyMasks();
        }

        // Gráfico do Dashboard (Chart.js)
        function renderChart() {
            const ctx = document.getElementById('yearlyChart');
            if(!ctx) return;
            
            // Ordenar histórico cronologicamente
            const sortedClosures = [...state.closures].sort((a,b) => a.month.localeCompare(b.month));
            const labels = sortedClosures.map(c => c.month);
            const revenues = sortedClosures.map(c => c.margemTotalRealizada);
            const costs = sortedClosures.map(c => c.custosTotais);

            if(state.chartInstance) state.chartInstance.destroy();
            
            state.chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.length > 0 ? labels : ['Mês Exemplo'],
                    datasets: [
                        { label: 'Faturamento (Margem)', data: revenues.length > 0 ? revenues : [0], backgroundColor: '#dc2626', borderRadius: 4, maxBarThickness: 40 },
                        { label: 'Custos Totais', data: costs.length > 0 ? costs : [0], backgroundColor: '#374151', borderRadius: 4, maxBarThickness: 40 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 1000, easing: 'easeOutQuart' },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#2a2a2a', borderDash: [5, 5] }, ticks: { color: '#9ca3af', callback: function(val){ return 'R$ ' + val; } } },
                        x: { grid: { display: false }, ticks: { color: '#9ca3af' } }
                    },
                    plugins: {
                        legend: { labels: { color: '#e5e7eb', font: { family: 'inherit' } } },
                        tooltip: { backgroundColor: '#141414', titleColor: '#fff', bodyColor: '#ccc', borderColor: '#333', borderWidth: 1 }
                    }
                }
            });
        }

        // --- GERAÇÃO DE HTML DAS ABAS ---
        function getDashboardHTML() {
            const activeC = state.clients.filter(c => c.status !== 'Churn');
            const prevMRR = activeC.reduce((a, c) => a + Number(c.recurringValue || 0), 0);
            const prevOT = activeC.reduce((a, c) => a + Number(c.oneTimeValue || 0), 0);
            
            const moTrans = state.transactions.filter(t => t.month === state.selectedMonth);
            const realMRR = moTrans.filter(t => t.type === 'recorrente').reduce((a, c) => a + c.value, 0);
            const realOT = moTrans.filter(t => t.type === 'onetime').reduce((a, c) => a + c.value, 0);
            const realMargin = moTrans.reduce((a, c) => a + c.marginValue, 0);

            const cFixo = state.team.reduce((a, c) => a + Number(c.cost || 0), 0);
            const cVar = 400; // Terceiros simulado
            const lucro = realMargin - (cFixo + cVar);

            const barRecPercent = prevMRR > 0 ? Math.min(100, Math.round((realMRR / prevMRR) * 100)) : 0;
            const barOTPercent = prevOT > 0 ? Math.min(100, Math.round((realOT / prevOT) * 100)) : 0;

            return `
                <div class="space-y-6 animate-fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="p-6 rounded-xl border bg-[#141414] border-[#2a2a2a] transition-all hover:border-[#444] hover:shadow-lg">
                            <div class="flex justify-between items-start mb-2"><h3 class="text-gray-400 text-sm font-medium">MRR Bruto (Realizado)</h3><i data-lucide="trending-up" class="text-gray-400"></i></div>
                            <div class="text-3xl font-bold text-white">${formatCurrency(realMRR)}</div>
                        </div>
                        <div class="p-6 rounded-xl border bg-red-900/10 border-red-500/30 transition-all hover:border-red-500/50 hover:shadow-lg hover:shadow-red-900/10">
                            <div class="flex justify-between items-start mb-2"><h3 class="text-gray-400 text-sm font-medium">MRR Margem (MC)</h3><i data-lucide="dollar-sign" class="text-red-500"></i></div>
                            <div class="text-3xl font-bold text-white">${formatCurrency(realMargin)}</div>
                        </div>
                        <div class="p-6 rounded-xl border bg-[#141414] border-[#2a2a2a] transition-all hover:border-[#444] hover:shadow-lg">
                            <div class="flex justify-between items-start mb-2"><h3 class="text-gray-400 text-sm font-medium">Lucro Líquido</h3><i data-lucide="check-circle-2" class="${lucro >= 0 ? 'text-emerald-500' : 'text-red-500'}"></i></div>
                            <div class="text-3xl font-bold ${lucro >= 0 ? 'text-emerald-500' : 'text-red-500'}">${formatCurrency(lucro)}</div>
                        </div>
                    </div>
                    
                    <!-- Novo Gráfico de Evolução -->
                    <div class="bg-[#141414] border border-[#2a2a2a] rounded-xl p-6 shadow-md transition-all hover:border-[#444]">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-semibold flex items-center gap-2"><i data-lucide="bar-chart-2" class="text-red-500 w-5 h-5"></i> Evolução Anual</h3>
                            <span class="text-xs text-gray-500 bg-[#2a2a2a] px-2 py-1 rounded">Baseado no Histórico</span>
                        </div>
                        <div class="h-64 w-full relative">
                            ${state.closures.length === 0 ? '<div class="absolute inset-0 flex items-center justify-center text-gray-500 text-sm">Trave um mês no Fechamento para ver os gráficos.</div>' : ''}
                            <canvas id="yearlyChart"></canvas>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-[#141414] border border-[#2a2a2a] rounded-xl p-6 transition-all hover:border-[#444]">
                            <h3 class="text-lg font-semibold mb-4 flex items-center gap-2"><i data-lucide="alert-circle" class="text-red-500 w-5 h-5"></i> Previsto vs Realizado</h3>
                            <div class="space-y-4">
                                <div><div class="flex justify-between text-sm mb-1"><span class="text-gray-300">MRR (Recorrente)</span><span class="text-gray-400">${formatCurrency(realMRR)} / ${formatCurrency(prevMRR)}</span></div><div class="h-2 w-full bg-[#2a2a2a] rounded-full overflow-hidden"><div class="h-full bg-red-600 transition-all duration-1000 ease-out" style="width: ${barRecPercent}%"></div></div></div>
                                <div><div class="flex justify-between text-sm mb-1"><span class="text-gray-300">Projetos (One Time)</span><span class="text-gray-400">${formatCurrency(realOT)} / ${formatCurrency(prevOT)}</span></div><div class="h-2 w-full bg-[#2a2a2a] rounded-full overflow-hidden"><div class="h-full bg-red-600 transition-all duration-1000 ease-out" style="width: ${barOTPercent}%"></div></div></div>
                            </div>
                        </div>
                        <div class="bg-[#141414] border border-[#2a2a2a] rounded-xl p-6 transition-all hover:border-[#444]">
                            <h3 class="text-lg font-semibold mb-4 flex items-center gap-2"><i data-lucide="wallet" class="text-red-500 w-5 h-5"></i> Fluxo de Caixa Simples</h3>
                            <div class="space-y-3 text-sm">
                                <div class="flex justify-between items-center pb-2 border-b border-[#2a2a2a]"><span class="text-gray-400">Entradas (Margem MC)</span><span class="font-medium text-white">${formatCurrency(realMargin)}</span></div>
                                <div class="flex justify-between items-center pb-2 border-b border-[#2a2a2a]"><span class="text-gray-400">Custos Fixos Equipe</span><span class="font-medium text-red-400">-${formatCurrency(cFixo)}</span></div>
                                <div class="flex justify-between items-center pb-2 border-b border-[#2a2a2a]"><span class="text-gray-400">Custos Variáveis Estimados</span><span class="font-medium text-red-400">-${formatCurrency(cVar)}</span></div>
                                <div class="flex justify-between items-center pt-2 text-lg"><span class="font-bold text-white">Resultado</span><span class="font-bold ${lucro >= 0 ? 'text-emerald-500' : 'text-red-500'}">${formatCurrency(lucro)}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getClientsHTML() {
            const moTrans = state.transactions.filter(t => t.month === state.selectedMonth);
            const list = state.clients.filter(c => state.clientFilter === 'Todos' || c.phase === state.clientFilter);
            
            let html = `
                <div class="animate-fade-in flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <div class="flex gap-2 overflow-x-auto w-full md:w-auto pb-2 md:pb-0 scrollbar-hide">
                        ${['Todos', 'Manutenção', 'Implementação', 'Tratativa'].map(p => `
                            <button onclick="window.appActions.setClientFilter('${p}')" class="px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-300 whitespace-nowrap ${state.clientFilter === p ? 'bg-red-600 text-white shadow-md shadow-red-900/30 transform scale-105' : 'bg-[#1a1a1a] text-gray-400 border border-[#333] hover:border-[#555]'}">${p}</button>
                        `).join('')}
                    </div>
                    <button onclick="window.appActions.openClientModal()" class="bg-white text-black px-4 py-2 rounded-lg font-medium flex items-center gap-2 hover:bg-gray-200 transition-transform hover:scale-105 w-full md:w-auto justify-center"><i data-lucide="plus" class="w-4 h-4"></i> Novo Cliente</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 animate-fade-in">
            `;

            if(list.length === 0) html += `<div class="col-span-full py-10 text-center text-gray-500 border border-dashed border-[#333] rounded-xl bg-[#141414]">Nenhum cliente encontrado.</div>`;

            html += list.map(client => {
                const cTrans = moTrans.filter(t => t.clientId === client.id);
                const recTrans = cTrans.find(t => t.type === 'recorrente');
                const otTrans = cTrans.find(t => t.type === 'onetime');
                const isChurn = client.status === 'Churn';

                return `
                    <div class="bg-[#141414] border ${isChurn ? 'border-red-900/50 opacity-60' : 'border-[#2a2a2a] hover:border-[#444] hover:shadow-lg'} rounded-xl p-5 relative transition-all duration-300 transform hover:-translate-y-1 group">
                        ${isChurn ? `<div class="absolute top-0 right-0 bg-red-900/80 text-white text-xs px-2 py-1 rounded-bl-lg font-bold shadow-md">CHURN</div>` : ''}
                        <div class="cursor-pointer" onclick="window.appActions.openClientModal('${client.id}')">
                            <div class="flex justify-between items-start mb-3">
                                <div><h3 class="font-bold text-lg text-white group-hover:text-red-400 transition-colors">${client.name}</h3><span class="text-xs text-red-400 bg-red-400/10 px-2 py-0.5 rounded border border-red-500/20">${client.phase}</span></div>
                                <i data-lucide="chevron-right" class="text-gray-600 w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                            </div>
                            <div class="space-y-1 mb-4">
                                <p class="text-sm text-gray-400"><span class="text-gray-500">Fornecedor:</span> ${client.supplier || '-'}</p>
                                <p class="text-sm text-gray-400"><span class="text-gray-500">Sistema:</span> ${client.system || '-'}</p>
                            </div>
                        </div>
                        ${!isChurn ? `
                        <div class="pt-3 border-t border-[#2a2a2a] space-y-2">
                            ${Number(client.recurringValue)>0 ? `<div class="flex items-center justify-between"><span class="text-xs text-gray-500">MRR: <span class="font-medium text-gray-300">${formatCurrency(client.recurringValue)}</span></span>
                                ${recTrans 
                                    ? `<button onclick="window.appActions.removeBaixa('${recTrans.id}')" class="text-xs bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded border border-emerald-500/20 flex items-center gap-1 transition-all hover:bg-emerald-500/20 hover:scale-105"><i data-lucide="check" class="w-3 h-3"></i> Recebido</button>`
                                    : `<button onclick="window.appActions.darBaixa('${client.id}', '${client.name}', ${client.recurringValue}, 'recorrente')" class="text-xs bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white px-2 py-1 rounded border border-red-500/20 transition-all hover:scale-105 shadow-sm">Dar Baixa MRR</button>`
                                }</div>` : ''}
                            ${Number(client.oneTimeValue)>0 ? `<div class="flex items-center justify-between"><span class="text-xs text-gray-500">O.T.: <span class="font-medium text-gray-300">${formatCurrency(client.oneTimeValue)}</span></span>

                                    ? `<button onclick="window.appActions.removeBaixa('${otTrans.id}')" class="text-xs bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded border border-emerald-500/20 flex items-center gap-1 transition-all hover:bg-emerald-500/20 hover:scale-105"><i data-lucide="check" class="w-3 h-3"></i> Recebido</button>`
                                    : `<button onclick="window.appActions.darBaixa('${client.id}', '${client.name}', ${client.oneTimeValue}, 'onetime')" class="text-xs bg-gray-800 text-gray-300 hover:bg-white hover:text-black px-2 py-1 rounded border border-gray-700 transition-all hover:scale-105 shadow-sm">Dar Baixa O.T.</button>`
                                }</div>` : ''}
                        </div>` : ''}
                    </div>
                `;
            }).join('');
            return html + '</div>';
        }

        function getTeamHTML() {
            let html = `
                <div class="animate-fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-white">Gestão da Equipe</h2>
                        <button onclick="window.appActions.openTeamModal()" class="bg-white text-black px-4 py-2 rounded-lg font-medium flex items-center gap-2 hover:bg-gray-200 transition-transform hover:scale-105"><i data-lucide="plus" class="w-4 h-4"></i> Novo Integrante</button>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            `;
            if(state.team.length === 0) {
                html += `<div class="col-span-full py-12 text-center border border-dashed border-[#333] rounded-xl bg-[#141414]"><i data-lucide="briefcase" class="w-8 h-8 mx-auto text-gray-600 mb-3"></i><p class="text-gray-400">Nenhum integrante cadastrado.</p></div>`;
            } else {
                html += state.team.map(member => {
                    const mClients = state.clients.filter(c => c.assignedMemberId === member.id && c.status !== 'Churn');
                    const mrrMcGerado = mClients.reduce((acc, c) => acc + (calcMargin(Number(c.recurringValue||0)) * (Number(c.memberPercentage||100)/100)), 0);

                    const lucro = mrrMcGerado - mCost;
                    
                    return `
                    <div class="bg-[#141414] border border-[#2a2a2a] rounded-xl p-6 relative group hover:border-[#444] transition-all duration-300 hover:-translate-y-1 hover:shadow-lg">

                            <button onclick="window.appActions.openTeamModal('${member.id}')" class="p-1.5 bg-[#2a2a2a] rounded text-gray-400 hover:text-white hover:bg-gray-600 transition-colors"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
                            <button onclick="window.appActions.deleteTeam('${member.id}')" class="p-1.5 bg-[#2a2a2a] rounded text-gray-400 hover:text-red-500 hover:bg-red-900/30 transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>

                        <div class="flex items-center gap-4 mb-6">
                            <div class="w-14 h-14 bg-red-900/30 border-2 border-red-500/50 rounded-full flex items-center justify-center text-2xl font-bold text-red-400 shadow-inner">${member.name.charAt(0).toUpperCase()}</div>
                            <div><h3 class="font-bold text-lg text-white">${member.name}</h3><p class="text-sm text-gray-400 bg-[#2a2a2a] px-2 py-0.5 rounded inline-block mt-1">${member.role || 'Membro'}</p></div>
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between text-sm"><span class="text-gray-500">Custo Mensal:</span><span class="text-red-400 font-medium">${formatCurrency(mCost)}</span></div>
                            <div class="flex justify-between text-sm"><span class="text-gray-500">MRR MC Gerado:</span><span class="text-emerald-400 font-medium">${formatCurrency(mrrMcGerado)}</span></div>
                            <div class="pt-3 border-t border-[#2a2a2a] flex justify-between items-center"><span class="text-sm font-bold text-white">Lucro Pessoal:</span><span class="font-bold text-lg ${lucro>=0?'text-emerald-500':'text-red-500'} bg-black/30 px-2 py-1 rounded">${formatCurrency(lucro)}</span></div>

                        <div class="mt-4 pt-4 border-t border-[#2a2a2a]">
                            <p class="text-xs text-gray-500 mb-2 uppercase font-medium">Projetos Ativos (${mClients.length})</p>

                                ${mClients.map(c => `<span class="text-[10px] uppercase font-bold tracking-wider bg-[#222] border border-[#333] text-gray-300 px-2 py-1 rounded-full">${c.name} <span class="text-red-500">${c.memberPercentage||100}%</span></span>`).join('')}
                                ${mClients.length===0 ? '<span class="text-xs text-gray-600 italic">Nenhum projeto atual</span>':''}
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }
            return html + '</div></div>';
        }

        function getClosureHTML() {
            const moTrans = state.transactions.filter(t => t.month === state.selectedMonth);
            const isLocked = state.closures.some(c => c.month === state.selectedMonth && c.locked);
            
            let html = `
                <div class="bg-[#141414] border border-[#2a2a2a] rounded-xl overflow-hidden relative shadow-lg animate-fade-in">
                    <div class="p-6 border-b border-[#2a2a2a] bg-[#1a1a1a] flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                        <div><h2 class="text-xl font-bold text-white">Fechamento Oficial: <span class="text-red-500">${state.selectedMonth}</span></h2><p class="text-sm text-gray-400 mt-1">Confronte o que foi previsto com o que realmente entrou no caixa.</p></div>
                        ${isLocked ? `<div class="bg-red-900/30 text-red-400 border border-red-500/50 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-inner"><i data-lucide="lock" class="w-4 h-4"></i> Mês Travado & Salvo</div>` : ''}
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead><tr class="bg-[#0a0a0a] border-b border-[#2a2a2a] text-xs uppercase tracking-wider text-gray-500">
                                <th class="p-4 font-medium">Cliente</th><th class="p-4">Previsto MRR</th><th class="p-4">Realizado MRR</th>
                                <th class="p-4">Previsto O.T.</th><th class="p-4">Realizado O.T.</th><th class="p-4">Margem MC (Entrada)</th><th class="p-4 text-center">Status</th>
                            </tr></thead>
                            <tbody class="divide-y divide-[#2a2a2a]">
            `;

            const validClients = state.clients.filter(c => c.status !== 'Churn' || (c.status === 'Churn' && moTrans.some(t => t.clientId === c.id)));
            if(validClients.length === 0) html += `<tr><td colspan="7" class="p-8 text-center text-gray-500">Nenhum cliente ativo para faturar neste mês.</td></tr>`;

            validClients.forEach(client => {
                const cTrans = moTrans.filter(t => t.clientId === client.id);
                const recT = cTrans.find(t => t.type === 'recorrente');
                const otT = cTrans.find(t => t.type === 'onetime');
                const pR = Number(client.recurringValue||0), pO = Number(client.oneTimeValue||0);
                const rR = recT?recT.value:0, rO = otT?otT.value:0;
                const mTotal = (recT?recT.marginValue:0) + (otT?otT.marginValue:0);
                const isPaid = (pR===0 || rR>0) && (pO===0 || rO>0);
                const isPend = (pR>0 && rR===0) || (pO>0 && rO===0);
                
                html += `
                    <tr class="hover:bg-[#1a1a1a] text-sm transition-colors">
                        <td class="p-4 font-medium text-white">${client.name} ${client.status==='Churn'?'<span class="text-red-500 text-[10px] bg-red-900/20 px-1 rounded ml-2 uppercase tracking-wide border border-red-900/50">Churn</span>':''}</td>
                        <td class="p-4 text-gray-400">${formatCurrency(pR)}</td>
                        <td class="p-4 ${rR>0?'text-emerald-400 font-medium':'text-gray-600'}">${formatCurrency(rR)}</td>
                        <td class="p-4 text-gray-400">${formatCurrency(pO)}</td>
                        <td class="p-4 ${rO>0?'text-emerald-400 font-medium':'text-gray-600'}">${formatCurrency(rO)}</td>
                        <td class="p-4 text-red-400 font-bold bg-[#111]">${formatCurrency(mTotal)}</td>
                        <td class="p-4 text-center">${isPaid &&(pR>0||pO>0)?'<span class="bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 px-2 py-1 rounded text-xs inline-flex items-center gap-1"><i data-lucide="check" class="w-3 h-3"></i> Pago</span>' : isPend ? '<span class="bg-amber-500/10 text-amber-500 border border-amber-500/20 px-2 py-1 rounded text-xs inline-flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> Pendente</span>' : '<span class="text-gray-600">-</span>'}</td>
                    </tr>
                `;
            });
            html += `</tbody></table></div>
                <div class="p-6 bg-[#0a0a0a] border-t border-[#2a2a2a] flex flex-col md:flex-row justify-end gap-4 items-center">
                    <span id="lock-msg" class="text-emerald-400 text-sm font-medium hidden flex items-center gap-1 animate-fade-in"><i data-lucide="check-circle" class="w-4 h-4"></i> Mês Salvo no Histórico!</span>
                    <button onclick="window.appActions.lockMonth()" class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-transform shadow-lg shadow-red-900/30 hover:scale-105"><i data-lucide="${isLocked ? 'refresh-cw' : 'save'}" class="w-5 h-5"></i> ${isLocked ? 'Atualizar Travamento' : 'Travar Mês e Gerar Histórico'}</button>
                </div></div>`;
            return html;
        }

                                <button id="btn-save-profile" onclick="window.appActions.saveProfile()" class="w-full sm:w-auto bg-white text-black px-8 py-2.5 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-gray-200 transition-transform hover:scale-105 shadow-lg">

        // --- AÇÕES DO APLICATIVO ---
        window.appActions = {
            changeTab: (tab) => { 
                state.activeTab = tab; 
                if(window.innerWidth < 768) {
                    document.getElementById('sidebar').classList.add('-translate-x-full');
                    document.getElementById('sidebar-overlay').classList.add('hidden');
                }
                updateApp(); 
            },
            setClientFilter: (filter) => { state.clientFilter = filter; updateApp(); },
            
            toggleMobileMenu: () => {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            },

            setLoading: (isLoading, btnId) => {
                const btn = document.getElementById(btnId);
                if (!btn) return;
                if (isLoading) {
                    btn.disabled = true;
                    btn.dataset.originalHtml = btn.innerHTML;
                    btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-current mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
                } else {
                    btn.disabled = false;
                    if (btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
                }
            },

            toggleAuthMode: () => {
                state.isSignUpMode = !state.isSignUpMode;
                document.getElementById('name-field').classList.toggle('hidden', !state.isSignUpMode);
                document.getElementById('btn-action').innerText = state.isSignUpMode ? 'Criar Conta e Entrar' : 'Entrar';
                document.getElementById('toggle-auth-text').innerText = state.isSignUpMode ? 'Já tem uma conta?' : 'Não tem uma conta?';
                document.querySelector('#toggle-auth-text + button').innerText = state.isSignUpMode ? 'Fazer login' : 'Criar conta';
                document.getElementById('login-error').classList.add('hidden');
            },

            handleEmailAuth: async () => {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                const name = document.getElementById('login-name').value;
                const errorEl = document.getElementById('login-error');
                
                try {
                    errorEl.classList.add('hidden');
                    if (!email || !password) throw new Error("Preencha e-mail e senha.");
                    window.appActions.setLoading(true, 'btn-action');
                    
                    if (state.isSignUpMode) {
                        if (!name) throw new Error("Por favor, preencha seu nome para prosseguirmos.");
                        const cred = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(cred.user, { displayName: name });
                    } else {
                        await signInWithEmailAndPassword(auth, email, password);
                    }
                } catch(e) {
                    let msg = "Erro na autenticação.";
                    if(e.code === 'auth/invalid-email') msg = "E-mail com formato inválido.";
                    if(e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = "Credenciais incorretas.";
                    if(e.code === 'auth/email-already-in-use') msg = "Este e-mail já está sendo utilizado.";
                    if(e.code === 'auth/weak-password') msg = "A senha deve ter pelo menos 6 caracteres.";
                    errorEl.innerText = e.message || msg;
                    errorEl.classList.remove('hidden');
                } finally {
                    window.appActions.setLoading(false, 'btn-action');
                }
            },

            loginAnonymously: async () => {
                const errorEl = document.getElementById('login-error');
                errorEl.classList.add('hidden');
                window.appActions.setLoading(true, 'btn-guest');
                try { await signInAnonymously(auth); } 
                catch(e) { errorEl.innerText = "Falha no acesso rápido: " + e.message; errorEl.classList.remove('hidden'); window.appActions.setLoading(false, 'btn-guest'); }
            },

            loginWithGoogle: async () => {
                const errorEl = document.getElementById('login-error');
                errorEl.classList.add('hidden');
                window.appActions.setLoading(true, 'btn-google');
                try {
                    const provider = new GoogleAuthProvider();
                    provider.setCustomParameters({ prompt: 'select_account' });
                    await signInWithPopup(auth, provider);
                } catch(e) {
                    let msg = "Erro ao conectar com Google.";
                    if (e.code === 'auth/unauthorized-domain') {
                        const domain = window.location.hostname;
                        msg = `<strong>Segurança do Firebase:</strong><br/>Para o login do Google funcionar, adicione o domínio atual no Firebase (Authentication > Configurações > Domínios Autorizados):<br/><div class="bg-black text-red-400 p-2 rounded font-mono text-center select-all border border-red-900/50 my-2 text-xs">${domain}</div>Para testar agora, use <strong>"Acesso Rápido"</strong>.`;
                    } else if (e.code === 'auth/popup-closed-by-user') { msg = "Login cancelado por você."; } 
                      else if (e.code === 'auth/popup-blocked') { msg = "Pop-up bloqueado pelo navegador."; }
                    errorEl.innerHTML = msg;
                    errorEl.classList.remove('hidden');
                } finally {
                    window.appActions.setLoading(false, 'btn-google');
                }
            },

            logout: () => signOut(auth),

            // Ações do Perfil
            saveProfile: async () => {
                if(!state.user) return;
                const newName = document.getElementById('profile-name').value;
                const newPass = document.getElementById('profile-password').value;
                const msgEl = document.getElementById('profile-msg');
                window.appActions.setLoading(true, 'btn-save-profile');
                
                try {
                    if (newName && newName !== state.user.displayName) {
                        await updateProfile(auth.currentUser, { displayName: newName });
                        state.user = auth.currentUser; // Update local state reference
                        updateHeaderGreeting(); // update top UI
                    }
                    if (newPass) {
                        await updatePassword(auth.currentUser, newPass);
                        document.getElementById('profile-password').value = '';
                    }
                    msgEl.className = 'bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded p-3 text-sm font-medium animate-fade-in block mb-4';
                    msgEl.innerHTML = '<i data-lucide="check" class="inline w-4 h-4 mr-1"></i> Perfil atualizado com sucesso!';
                    lucide.createIcons();
                    setTimeout(() => msgEl.classList.add('hidden'), 4000);
                } catch(e) {
                    msgEl.className = 'bg-red-500/10 border border-red-500/20 text-red-400 rounded p-3 text-sm font-medium animate-fade-in block mb-4';
                    if(e.code === 'auth/requires-recent-login') {
                        msgEl.innerHTML = 'Para mudar a senha, saia e faça login novamente por segurança.';
                    } else {
                        msgEl.innerHTML = 'Erro: ' + e.message;
                    }
                } finally {
                    window.appActions.setLoading(false, 'btn-save-profile');
                }
            },
            
            updateProfilePhoto: async (input) => {
                if(!state.user || !input.files || input.files.length === 0) return;
                const file = input.files[0];
                // Como não configuramos Storage, criaremos um DataURL (Base64) para teste (limite 1MB Firestore/Auth Profile)
                if(file.size > 1024 * 1024) { alert("Imagem muito grande! Use imagens menores que 1MB."); return; }
                
                const reader = new FileReader();
                reader.onloadend = async () => {
                    try {
                        await updateProfile(auth.currentUser, { photoURL: reader.result });
                        state.user = auth.currentUser;
                        renderContent(); // reload profile tab to show img
                        updateHeaderGreeting(); // update sidebar
                    } catch(e) { alert("Erro ao salvar foto: " + e.message); }
                };
                reader.readAsDataURL(file);
            },

            // Modais de Cadastro (Clients/Team/History)

                document.getElementById('modal-backdrop').classList.add('hidden');
                ['modal-client', 'modal-team', 'modal-history'].forEach(id => document.getElementById(id).classList.add('hidden'));

                    document.getElementById('client-serviceType').value = client.serviceType || '';
                    document.getElementById('client-assignedMemberId').value = client.assignedMemberId || '';
                    document.getElementById('client-memberPercentage').value = client.memberPercentage || 100;

                    document.getElementById('client-recurringMargin').innerText = 'R$ 0,00';
                    setCurrencyInput('client-oneTimeValue', 0);
                    document.getElementById('client-oneTimeMargin').innerText = 'R$ 0,00';
                    document.getElementById('client-deliveryDate').value = '';
                    document.getElementById('client-nps').value = '';
                    document.getElementById('client-observation').value = '';
                }
                document.getElementById('modal-backdrop').classList.remove('hidden');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            },

            saveClient: async () => {
                if(!state.user) return;
                const data = {
                    name: document.getElementById('client-name').value,
                    phase: document.getElementById('client-phase').value,
                    status: document.getElementById('client-status').value,
                    supplier: document.getElementById('client-supplier').value,
                    system: document.getElementById('client-system').value,
                    serviceType: document.getElementById('client-serviceType').value,
                    assignedMemberId: document.getElementById('client-assignedMemberId').value,
                    memberPercentage: Number(document.getElementById('client-memberPercentage').value),
                    recurringValue: getCurrencyInput('client-recurringValue'),
                    oneTimeValue: getCurrencyInput('client-oneTimeValue'),
                    deliveryDate: document.getElementById('client-deliveryDate').value,
                    nps: document.getElementById('client-nps').value,
                    observation: document.getElementById('client-observation').value
                };
                const cid = document.getElementById('client-id').value;
                try {
                    if (cid) await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'clients', cid), data);
                    else await addDoc(collection(db, 'artifacts', appId, 'users', state.user.uid, 'clients'), { ...data, createdAt: new Date().toISOString() });

                } catch(e) { console.error(e); }

            openTeamModal: (id = null) => {
                const modal = document.getElementById('modal-team');
                if(id) {
                    const member = state.team.find(m => m.id === id);
                    document.getElementById('team-modal-title').innerText = 'Editar Integrante';
                    document.getElementById('team-id').value = member.id;
                    document.getElementById('team-name').value = member.name || '';
                    document.getElementById('team-role').value = member.role || '';
                    setCurrencyInput('team-cost', member.cost);
                } else {
                    document.getElementById('team-modal-title').innerText = 'Novo Integrante';
                    document.getElementById('team-id').value = '';
                    document.getElementById('team-name').value = '';
                    document.getElementById('team-role').value = '';
                    setCurrencyInput('team-cost', 0);
                }
                document.getElementById('modal-backdrop').classList.remove('hidden');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            },

            saveTeam: async () => {
                if(!state.user) return;
                const data = {
                    name: document.getElementById('team-name').value,
                    role: document.getElementById('team-role').value,
                    cost: getCurrencyInput('team-cost')
                };
                const mid = document.getElementById('team-id').value;
                try {
                    if (mid) await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'team', mid), data);
                    else await addDoc(collection(db, 'artifacts', appId, 'users', state.user.uid, 'team'), { ...data, createdAt: new Date().toISOString() });
                    window.appActions.closeModal();
                } catch(e) { console.error(e); }
            },
            
            deleteTeam: async (id) => {
                if(confirm('Tem certeza que deseja excluir este integrante?')) {
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'team', id)); } catch(e) { console.error(e); }
                }
            },

            openHistoryModal: (month = null) => {
                const modal = document.getElementById('modal-history');
                const monthInput = document.getElementById('history-month');
                if(month) {
                    const closure = state.closures.find(c => c.month === month);
                    document.getElementById('history-modal-title').innerText = 'Editar Histórico Oficial';
                    monthInput.value = closure.month;
                    monthInput.disabled = true;
                    setCurrencyInput('history-mrr', closure.mrrBrutoRealizado);
                    setCurrencyInput('history-margin', closure.margemTotalRealizada);
                    setCurrencyInput('history-cost', closure.custosTotais);
                } else {
                    document.getElementById('history-modal-title').innerText = 'Adicionar Mês Passado';
                    monthInput.value = '';
                    monthInput.disabled = false;
                    setCurrencyInput('history-mrr', 0);
                    setCurrencyInput('history-margin', 0);
                    setCurrencyInput('history-cost', 0);
                }
                document.getElementById('modal-backdrop').classList.remove('hidden');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            },

            saveHistory: async () => {
                if(!state.user) return;
                const data = {
                    month: document.getElementById('history-month').value,
                    mrrBrutoRealizado: getCurrencyInput('history-mrr'),
                    margemTotalRealizada: getCurrencyInput('history-margin'),
                    custosTotais: getCurrencyInput('history-cost'),
                };
                if(!data.month) return;
                data.lucroLiquido = data.margemTotalRealizada - data.custosTotais;
                data.locked = true;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'monthly_closures', data.month), { ...data, updatedAt: new Date().toISOString() }, { merge: true });
                    window.appActions.closeModal();
                } catch(e) { console.error(e); }
            },

            darBaixa: async (clientId, clientName, value, type) => {
                if(!state.user) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', state.user.uid, 'transactions'), {
                        clientId, clientName, month: state.selectedMonth, value: Number(value), marginValue: calcMargin(Number(value)), type, createdAt: new Date().toISOString()
                    });
                } catch(e) { console.error(e); }
            },

            removeBaixa: async (tid) => {
                if(!state.user) return;
                try { await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'transactions', tid)); } catch(e) { console.error(e); }
            },

            lockMonth: async () => {
                if(!state.user) return;
                const moTrans = state.transactions.filter(t => t.month === state.selectedMonth);
                let tPrevRec=0, tRealRec=0, tMargin=0;
                
                state.clients.filter(c => c.status !== 'Churn' || (c.status === 'Churn' && moTrans.some(t => t.clientId === c.id))).forEach(client => {
                    const cTrans = moTrans.filter(t => t.clientId === client.id);
                    const recT = cTrans.find(t => t.type === 'recorrente');
                    const otT = cTrans.find(t => t.type === 'onetime');
                    tRealRec += recT?recT.value:0;
                    tMargin += (recT?recT.marginValue:0) + (otT?otT.marginValue:0);
                });

                const cFixo = state.team.reduce((a, c) => a + Number(c.cost||0), 0);
                const cTotal = cFixo + 400; // Fixo base terceiros
                const data = { month: state.selectedMonth, mrrBrutoRealizado: tRealRec, margemTotalRealizada: tMargin, custosTotais: cTotal, lucroLiquido: tMargin - cTotal, locked: true };

                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'monthly_closures', data.month), { ...data, updatedAt: new Date().toISOString() }, { merge: true });
                    const msg = document.getElementById('lock-msg');
                    if(msg) { msg.classList.remove('hidden'); setTimeout(()=>msg.classList.add('hidden'), 4000); }
                } catch(e) { console.error(e); }
            }
        };

        // Inputs & Load
        document.getElementById('selected-month').addEventListener('change', (e) => {
            state.selectedMonth = e.target.value;
            updateApp();
        });
        document.getElementById('selected-month').value = state.selectedMonth;

        function updateHeaderGreeting() {
            if(!state.user) return;
            const name = state.user.displayName || (state.user.isAnonymous ? 'Visitante' : 'Usuário');
            const firstName = name.split(' ')[0];
            document.getElementById('user-greeting').innerHTML = `Olá, <span class="font-bold text-white">${firstName}</span>`;
            document.getElementById('sidebar-user-name').innerText = name;
            
            // Avatar
            const avatarInitialStr = name.charAt(0).toUpperCase();
            document.getElementById('user-avatar').innerText = avatarInitialStr;
            
            if(state.user.photoURL) {
                document.getElementById('user-avatar').innerHTML = `<img src="${state.user.photoURL}" class="w-full h-full object-cover rounded-full" />`;
                document.getElementById('sidebar-avatar-img').src = state.user.photoURL;
                document.getElementById('sidebar-avatar-img').classList.remove('hidden');
                document.getElementById('sidebar-avatar-initial').classList.add('hidden');
            } else {
                document.getElementById('user-avatar').innerHTML = avatarInitialStr;
                document.getElementById('sidebar-avatar-initial').innerText = avatarInitialStr;
                document.getElementById('sidebar-avatar-img').classList.add('hidden');
                document.getElementById('sidebar-avatar-initial').classList.remove('hidden');
            }
        }

        let unsubListeners = [];
        onAuthStateChanged(auth, (user) => {
            state.user = user;
            if(user) {
                updateHeaderGreeting();
                document.getElementById('login-screen').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    const appScreen = document.getElementById('app-screen');
                    appScreen.classList.remove('hidden');
                    // timeout to allow display:block to apply before changing opacity for transition
                    setTimeout(()=> appScreen.classList.remove('opacity-0'), 50);
                }, 300); // tempo da animação
                
                unsubListeners.forEach(fn => fn()); unsubListeners = [];
                
                unsubListeners.push(onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'clients'), s => { state.clients = s.docs.map(d => ({id: d.id, ...d.data()})); updateApp(); }));
                unsubListeners.push(onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'transactions'), s => { state.transactions = s.docs.map(d => ({id: d.id, ...d.data()})); updateApp(); }));
                unsubListeners.push(onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'team'), s => { state.team = s.docs.map(d => ({id: d.id, ...d.data()})); updateApp(); }));
                unsubListeners.push(onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'monthly_closures'), s => { 
                    state.closures = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.month.localeCompare(a.month)); 
                    updateApp(); 
                }));
            } else {
                document.getElementById('app-screen').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('app-screen').classList.add('hidden');
                    const loginScreen = document.getElementById('login-screen');
                    loginScreen.classList.remove('hidden');
                    setTimeout(()=> loginScreen.classList.remove('opacity-0'), 50);
                }, 300);
                
                state.chartInstance?.destroy();
                state.chartInstance = null;
            }
        });
        
        // Esconder menu mobile ao redimensionar tela para desktop
        window.addEventListener('resize', () => {
            if(window.innerWidth >= 768) {
                document.getElementById('sidebar').classList.remove('-translate-x-full');
                document.getElementById('sidebar-overlay').classList.add('hidden');
            } else {
                document.getElementById('sidebar').classList.add('-translate-x-full');
            }
        });
    </script>
</body>
</html>
