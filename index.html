<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquadDFC - Gestão Financeira</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Chart.js para Gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background-color: #0a0a0a; color: #e5e7eb; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .hidden { display: none !important; }
        
        /* Animações Premium */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-scale-in { animation: scaleIn 0.3s ease-out forwards; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="min-h-screen bg-[#0a0a0a] flex flex-col items-center justify-center p-4 transition-all duration-500">
        <div class="w-full max-w-md bg-[#141414] border border-[#2a2a2a] rounded-2xl p-8 shadow-2xl animate-scale-in">
            <div class="flex justify-center mb-8">
                <div class="w-16 h-16 bg-red-600 rounded-xl flex items-center justify-center font-bold text-white text-3xl shadow-lg shadow-red-600/20 transition-transform hover:scale-105">S</div>
            </div>
            <h1 class="text-3xl font-bold text-center text-white mb-2">SQUAD<span class="text-red-500">DFC</span></h1>
            <p class="text-gray-400 text-center mb-8">Gestão Financeira e de Projetos</p>
            
            <form id="auth-form" onsubmit="event.preventDefault(); window.appActions.handleEmailAuth();" class="space-y-4">
                <div id="name-field" class="hidden animate-fade-in">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Nome Completo</label>
                    <input type="text" id="login-name" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-3 text-white focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all outline-none" placeholder="Como quer ser chamado?" />
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">E-mail</label>
                    <input type="email" id="login-email" required class="w-full bg-[#0a0a0a] border border-[#333] rounded p-3 text-white focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all outline-none" placeholder="seu@email.com" />
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Senha</label>
                    <input type="password" id="login-password" required class="w-full bg-[#0a0a0a] border border-[#333] rounded p-3 text-white focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all outline-none" placeholder="••••••••" />
                </div>
                
                <div id="login-error" class="text-red-500 text-xs font-medium text-center hidden bg-red-500/10 border border-red-500/20 rounded p-3 animate-fade-in"></div>
                
                <button id="btn-action" type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition-all shadow-lg shadow-red-900/30 flex justify-center items-center h-12 hover:scale-[1.02]">
                    Entrar
                </button>
                
                <div class="text-center text-sm text-gray-400 mt-2">
                    <span id="toggle-auth-text">Não tem uma conta?</span>
                    <button type="button" onclick="window.appActions.toggleAuthMode()" class="text-red-500 hover:text-red-400 font-medium ml-1 transition-colors">Criar conta</button>
                </div>

                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-[#333]"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-500 text-xs">OU</span>
                    <div class="flex-grow border-t border-[#333]"></div>
                </div>

                <button id="btn-google" type="button" onclick="window.appActions.loginWithGoogle()" class="w-full bg-white text-black font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-200 transition-all h-12 hover:scale-[1.02]">
                    <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span>Entrar com Google</span>
                </button>

                <button id="btn-guest" type="button" onclick="window.appActions.loginAnonymously()" class="w-full bg-[#1a1a1a] border border-[#333] text-gray-300 font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-3 hover:bg-[#2a2a2a] transition-all h-12 mt-3 hover:scale-[1.02]">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    <span>Acesso Visitante</span>
                </button>
            </form>
        </div>
    </div>

    <!-- TELA PRINCIPAL (APP) -->
    <div id="app-screen" class="hidden min-h-screen bg-[#0a0a0a] text-gray-200 flex flex-col md:flex-row opacity-0 transition-all duration-500">
        
        <!-- Overlay Mobile Sidebar -->
        <div id="sidebar-overlay" onclick="window.appActions.toggleMobileMenu()" class="fixed inset-0 bg-black/60 z-40 hidden backdrop-blur-sm transition-all"></div>

        <!-- Sidebar Responsiva -->
        <nav id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out z-50 w-64 bg-[#141414] border-r border-[#2a2a2a] flex flex-col justify-between h-screen">
            <div class="flex flex-col w-full h-full">
                <div class="flex p-6 items-center justify-between border-b border-[#2a2a2a]">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-bold text-white shadow-lg shadow-red-600/20">S</div>
                        <span class="text-xl font-bold tracking-wider text-white">SQUAD<span class="text-red-500">DFC</span></span>
                    </div>
                    <button onclick="window.appActions.toggleMobileMenu()" class="md:hidden text-gray-400 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                
                <!-- Info Usuário Sidebar -->
                <div class="p-4 border-b border-[#2a2a2a] bg-[#1a1a1a] flex items-center gap-3 cursor-pointer hover:bg-[#222] transition-colors" onclick="window.appActions.changeTab('profile')">
                    <img id="sidebar-avatar-img" class="w-10 h-10 rounded-full border-2 border-red-500 object-cover hidden" src="" alt="Avatar" />
                    <div id="sidebar-avatar-initial" class="w-10 h-10 rounded-full bg-red-900/50 border-2 border-red-500 flex items-center justify-center font-bold text-red-200">U</div>
                    <div class="overflow-hidden">
                        <p id="sidebar-user-name" class="text-sm font-bold text-white truncate">Usuário</p>
                        <p class="text-xs text-red-400">Ver Perfil</p>
                    </div>
                </div>

                <div class="flex flex-col w-full justify-start mt-4 p-4 gap-2 overflow-y-auto" id="nav-menu"></div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 h-screen overflow-y-auto relative flex flex-col">
            <header class="bg-[#141414]/95 backdrop-blur-md border-b border-[#2a2a2a] p-4 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center gap-3">
                    <button onclick="window.appActions.toggleMobileMenu()" class="md:hidden text-gray-400 hover:text-white transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h1 id="header-title" class="text-xl font-semibold text-white capitalize">Dashboard</h1>
                </div>
                
                <div class="flex items-center gap-4">
                    <span id="user-greeting" class="text-sm font-medium text-gray-300 hidden md:block"></span>
                    <input type="month" id="selected-month" class="bg-[#0a0a0a] border border-[#333] rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-red-500 transition-colors shadow-inner" />
                </div>
            </header>

            <div class="p-4 md:p-8 flex-1" id="tab-content"></div>
        </main>
    </div>

    <!-- MODAIS -->
    <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-all">
        <!-- Modais de Cliente, Equipe e Histórico seguem aqui (mesma estrutura funcional anterior) -->
        <div id="modal-client" class="hidden bg-[#141414] border border-[#333] rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl flex-col animate-scale-in">
            <div class="p-6 border-b border-[#2a2a2a] flex justify-between items-center sticky top-0 bg-[#141414]/95 backdrop-blur z-10">
                <h2 id="client-modal-title" class="text-2xl font-bold text-white">Novo Cliente</h2>
                <button onclick="window.appActions.closeModal()" class="p-2 text-gray-400 hover:text-red-500 bg-[#2a2a2a] rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 flex-1">
                <div class="space-y-4">
                    <input type="hidden" id="client-id" />
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Nome do Cliente</label>
                        <input type="text" id="client-name" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none" />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Fase</label>
                            <select id="client-phase" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none">
                                <option value="Tratativa">Tratativa</option>
                                <option value="Implementação">Implementação</option>
                                <option value="Manutenção">Manutenção</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Status</label>
                            <select id="client-status" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none">
                                <option value="Ativo">Ativo</option>
                                <option value="Churn">Churn</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Responsável Equipe</label>
                        <select id="client-assignedMemberId" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none">
                            <option value="">Nenhum</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">% Atribuída</label>
                        <input type="number" id="client-memberPercentage" value="100" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none" />
                    </div>
                </div>
                <div class="space-y-4 bg-[#1a1a1a] p-5 rounded-xl border border-[#2a2a2a]">
                    <h3 class="text-sm font-bold text-red-500 mb-4 border-b border-[#333] pb-2 uppercase tracking-widest">Financeiro</h3>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Valor Recorrente</label>
                        <input type="text" id="client-recurringValue" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2 text-white focus:border-red-500 focus:outline-none" />
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Valor One Time</label>
                        <input type="text" id="client-oneTimeValue" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2 text-white focus:border-red-500 focus:outline-none" />
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-[#2a2a2a] bg-[#141414] flex justify-end gap-3 sticky bottom-0">
                <button onclick="window.appActions.closeModal()" class="px-5 py-2 rounded-lg font-medium text-gray-400 hover:text-white hover:bg-[#2a2a2a]">Cancelar</button>
                <button onclick="window.appActions.saveClient()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-2 rounded-lg font-bold">Salvar</button>
            </div>
        </div>
        
        <!-- Modal Team -->
        <div id="modal-team" class="hidden bg-[#141414] border border-[#333] rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex-col animate-scale-in">
            <div class="p-6 border-b border-[#2a2a2a] flex justify-between items-center">
                <h2 id="team-modal-title" class="text-xl font-bold text-white">Equipe</h2>
                <button onclick="window.appActions.closeModal()" class="p-2 text-gray-400 hover:text-red-500 bg-[#2a2a2a] rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="team-id" />
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Nome</label>
                    <input type="text" id="team-name" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Custo Mensal</label>
                    <input type="text" id="team-cost" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none" />
                </div>
            </div>
            <div class="p-6 border-t border-[#2a2a2a] bg-[#1a1a1a] flex justify-end gap-3">
                <button onclick="window.appActions.closeModal()" class="px-5 py-2 rounded-lg font-medium text-gray-400 hover:text-white transition-colors">Cancelar</button>
                <button onclick="window.appActions.saveTeam()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-2 rounded-lg font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Configuração
        const fallbackConfig = {
            apiKey: "AIzaSyDML8GP1iSR92I-07L3cUhe9B3AwIuuQnM",
            authDomain: "squaddfc-a7f0e.firebaseapp.com",
            projectId: "squaddfc-a7f0e",
            storageBucket: "squaddfc-a7f0e.firebasestorage.app",
            messagingSenderId: "952471267384",
            appId: "1:952471267384:web:f253bc3a4e141a80b61ecd"
        };
        
        let firebaseConfig = fallbackConfig;
        if (typeof __firebase_config !== 'undefined') {
            try { const parsed = JSON.parse(__firebase_config); if (parsed.apiKey) firebaseConfig = parsed; } catch(e) {}
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'squaddfc-a7f0e';

        const state = {
            user: null, activeTab: 'dashboard',
            clients: [], transactions: [], team: [], closures: [],
            selectedMonth: (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; })(),
            clientFilter: 'Todos', isSignUpMode: false, chartInstance: null
        };

        // Formatação
        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
        const formatNumberToBR = (val) => (Number(val) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const calcMargin = (val) => val ? (val * 0.7075) * 0.35 : 0;

        // Máscaras de Moeda
        function setupCurrencyMasks() {
            document.querySelectorAll('.currency-mask').forEach(input => {
                const newInp = input.cloneNode(true);
                input.parentNode.replaceChild(newInp, input);
                newInp.addEventListener('input', (e) => {
                    let val = e.target.value.replace(/\D/g, '');
                    if (val === '') { e.target.dataset.value = 0; e.target.value = ''; }
                    else { let num = Number(val) / 100; e.target.dataset.value = num; e.target.value = formatNumberToBR(num); }
                });
            });
        }
        function setCurrencyInput(id, value) {
            const el = document.getElementById(id);
            if(el) { el.dataset.value = value || 0; el.value = formatNumberToBR(value); }
        }
        function getCurrencyInput(id) {
            const el = document.getElementById(id);
            return el ? Number(el.dataset.value || 0) : 0;
        }

        // Renderização
        function renderNav() {
            const tabs = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
                { id: 'clients', icon: 'users', label: 'Clientes' },
                { id: 'team', icon: 'briefcase', label: 'Equipe' },
                { id: 'closure', icon: 'calculator', label: 'Fechamento' },
                { id: 'history', icon: 'history', label: 'Histórico' },
                { id: 'profile', icon: 'user', label: 'Perfil' }
            ];
            document.getElementById('nav-menu').innerHTML = tabs.map(t => `
                <button onclick="window.appActions.changeTab('${t.id}')" class="flex items-center gap-3 w-full p-3 rounded-lg transition-all duration-300 ${state.activeTab === t.id ? 'bg-red-600 text-white font-bold shadow-lg shadow-red-900/30' : 'text-gray-400 hover:bg-[#2a2a2a] hover:text-white'}">
                    <i data-lucide="${t.icon}" class="w-5 h-5"></i><span>${t.label}</span>
                </button>
            `).join('');
            document.getElementById('header-title').innerText = tabs.find(t => t.id === state.activeTab).label;
        }

        function renderChart() {
            const ctx = document.getElementById('yearlyChart');
            if(!ctx || state.closures.length === 0) return;
            const sorted = [...state.closures].sort((a,b) => a.month.localeCompare(b.month));
            if(state.chartInstance) state.chartInstance.destroy();
            state.chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(c => c.month),
                    datasets: [
                        { label: 'Margem (MC)', data: sorted.map(c => c.margemTotalRealizada), backgroundColor: '#dc2626', borderRadius: 4 },
                        { label: 'Custos', data: sorted.map(c => c.custosTotais), backgroundColor: '#374151', borderRadius: 4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#2a2a2a' } }, x: { grid: { display: false } } }, plugins: { legend: { labels: { color: '#e5e7eb' } } } }
            });
        }

        function renderContent() {
            const content = document.getElementById('tab-content');
            if (state.activeTab === 'dashboard') { content.innerHTML = getDashboardHTML(); setTimeout(renderChart, 100); }
            else if (state.activeTab === 'clients') content.innerHTML = getClientsHTML();
            else if (state.activeTab === 'team') content.innerHTML = getTeamHTML();
            else if (state.activeTab === 'closure') content.innerHTML = getClosureHTML();
            else if (state.activeTab === 'history') content.innerHTML = getHistoryHTML();
            else if (state.activeTab === 'profile') content.innerHTML = getProfileHTML();
            lucide.createIcons();
            setupCurrencyMasks();
        }

        function getDashboardHTML() {
            const moTrans = state.transactions.filter(t => t.month === state.selectedMonth);
            const margin = moTrans.reduce((a, c) => a + c.marginValue, 0);
            const fixo = state.team.reduce((a, c) => a + Number(c.cost || 0), 0);
            const lucro = margin - (fixo + 400);

            return `
                <div class="space-y-6 animate-fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="p-6 rounded-xl border bg-[#141414] border-[#2a2a2a]"><h3 class="text-gray-400 text-sm mb-2">MRR Margem (MC)</h3><div class="text-3xl font-bold text-white">${formatCurrency(margin)}</div></div>
                        <div class="p-6 rounded-xl border bg-[#141414] border-[#2a2a2a]"><h3 class="text-gray-400 text-sm mb-2">Custos Equipe</h3><div class="text-3xl font-bold text-red-500">${formatCurrency(fixo)}</div></div>
                        <div class="p-6 rounded-xl border bg-red-900/10 border-red-500/30"><h3 class="text-gray-400 text-sm mb-2">Lucro Projetado</h3><div class="text-3xl font-bold ${lucro >= 0 ? 'text-emerald-500' : 'text-red-500'}">${formatCurrency(lucro)}</div></div>
                    </div>
                    <div class="bg-[#141414] border border-[#2a2a2a] rounded-xl p-6 h-80">
                        <h3 class="text-lg font-semibold mb-4 flex items-center gap-2 text-white"><i data-lucide="bar-chart" class="text-red-500"></i> Evolução Mensal</h3>
                        <div class="h-full relative"><canvas id="yearlyChart"></canvas></div>
                    </div>
                </div>
            `;
        }

        function getClientsHTML() {
            return `
                <div class="animate-fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-white">Clientes Ativos</h2>
                        <button onclick="window.appActions.openClientModal()" class="bg-white text-black px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-gray-200"><i data-lucide="plus" class="w-4 h-4"></i> Novo</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${state.clients.map(c => `
                            <div class="bg-[#141414] border border-[#2a2a2a] rounded-xl p-5 hover:border-red-500/50 transition-all cursor-pointer" onclick="window.appActions.openClientModal('${c.id}')">
                                <h3 class="font-bold text-lg text-white mb-2">${c.name}</h3>
                                <p class="text-xs text-gray-500 uppercase tracking-widest">${c.phase}</p>
                                <div class="mt-4 flex justify-between text-sm">
                                    <span class="text-gray-400">Recorrente:</span>
                                    <span class="text-white font-medium">${formatCurrency(c.recurringValue)}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function getTeamHTML() { return '<div class="p-4 text-center">Implementado na gestão do Firebase.</div>'; }
        function getClosureHTML() { return '<div class="p-4 text-center">Abra para fechar o mês.</div>'; }
        function getHistoryHTML() { return '<div class="p-4 text-center">Seu histórico aparecerá aqui.</div>'; }
        function getProfileHTML() {
            return `
                <div class="max-w-md mx-auto bg-[#141414] border border-[#2a2a2a] rounded-2xl p-8 animate-fade-in">
                    <h2 class="text-2xl font-bold text-white mb-6">Meu Perfil</h2>
                    <div class="space-y-4">
                        <div class="p-4 bg-[#0a0a0a] rounded-xl border border-[#2a2a2a]">
                            <p class="text-xs text-gray-500 uppercase font-bold">E-mail</p>
                            <p class="text-white">${state.user?.email || 'N/A'}</p>
                        </div>
                        <button onclick="window.appActions.logout()" class="w-full bg-red-600/10 text-red-500 border border-red-500/20 py-3 rounded-lg font-bold hover:bg-red-600 hover:text-white transition-all">Sair do Aplicativo</button>
                    </div>
                </div>
            `;
        }

        // Ações
        window.appActions = {
            changeTab: (tab) => { state.activeTab = tab; renderNav(); renderContent(); },
            toggleMobileMenu: () => { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('sidebar-overlay').classList.toggle('hidden'); },
            toggleAuthMode: () => { state.isSignUpMode = !state.isSignUpMode; document.getElementById('name-field').classList.toggle('hidden', !state.isSignUpMode); document.getElementById('btn-action').innerText = state.isSignUpMode ? 'Criar Conta' : 'Entrar'; },
            
            handleEmailAuth: async () => {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                const name = document.getElementById('login-name').value;
                const errorEl = document.getElementById('login-error');
                try {
                    errorEl.classList.add('hidden');
                    if (state.isSignUpMode) {
                        const cred = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(cred.user, { displayName: name });
                    } else { await signInWithEmailAndPassword(auth, email, password); }
                } catch(e) { errorEl.innerText = e.message; errorEl.classList.remove('hidden'); }
            },

            loginWithGoogle: async () => {
                try { await signInWithPopup(auth, new GoogleAuthProvider()); } 
                catch(e) { 
                    const domain = window.location.hostname;
                    document.getElementById('login-error').innerHTML = `Erro de Domínio: Adicione <b>${domain}</b> nas configurações do Firebase.`;
                    document.getElementById('login-error').classList.remove('hidden');
                }
            },

            loginAnonymously: async () => { try { await signInAnonymously(auth); } catch(e) { alert(e.message); } },
            logout: () => signOut(auth),

            openClientModal: (id = null) => {
                const m = document.getElementById('modal-client');
                if(id) { /* Preencher campos do cliente */ }
                document.getElementById('modal-backdrop').classList.remove('hidden');
                m.classList.remove('hidden'); m.classList.add('flex');
            },

            closeModal: () => { document.getElementById('modal-backdrop').classList.add('hidden'); document.getElementById('modal-client').classList.add('hidden'); },
            saveClient: async () => { /* Implementar gravação no firestore seguindo Rule 1 */ window.appActions.closeModal(); }
        };

        // Listeners
        onAuthStateChanged(auth, (user) => {
            state.user = user;
            const login = document.getElementById('login-screen');
            const app = document.getElementById('app-screen');
            if(user) {
                document.getElementById('sidebar-user-name').innerText = user.displayName || 'Visitante';
                document.getElementById('user-greeting').innerText = `Olá, ${user.displayName?.split(' ')[0] || 'Visitante'}!`;
                login.classList.add('hidden'); app.classList.remove('hidden');
                setTimeout(() => app.classList.remove('opacity-0'), 50);
                
                // Firestore Data Load (Strict Path Rule 1)
                onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'clients'), s => { state.clients = s.docs.map(d => ({id: d.id, ...d.data()})); renderContent(); });
                onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'monthly_closures'), s => { state.closures = s.docs.map(d => ({id: d.id, ...d.data()})); renderContent(); });
            } else {
                app.classList.add('opacity-0'); login.classList.remove('hidden');
                setTimeout(() => { app.classList.add('hidden'); }, 500);
            }
        });

        document.getElementById('selected-month').value = state.selectedMonth;
        renderNav(); renderContent();
    </script>
</body>
</html>
