<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquadDFC - Gestão Financeira</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #0a0a0a; color: #e5e7eb; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        /* Ocultar elementos para navegação */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="min-h-screen bg-[#0a0a0a] flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#141414] border border-[#2a2a2a] rounded-2xl p-8 shadow-2xl">
            <div class="flex justify-center mb-8">
                <div class="w-16 h-16 bg-red-600 rounded-xl flex items-center justify-center font-bold text-white text-3xl shadow-lg shadow-red-600/20">S</div>
            </div>
            <h1 class="text-3xl font-bold text-center text-white mb-2">SQUAD<span class="text-red-500">DFC</span></h1>
            <p class="text-gray-400 text-center mb-8">Gestão Financeira e de Projetos</p>
            
            <button id="btn-login" class="w-full bg-white text-black font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-200 transition-colors">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Entrar com Google / Anon
            </button>
        </div>
    </div>

    <!-- TELA PRINCIPAL (APP) -->
    <div id="app-screen" class="hidden min-h-screen bg-[#0a0a0a] text-gray-200 flex flex-col md:flex-row">
        
        <!-- Sidebar -->
        <nav class="w-full md:w-64 bg-[#141414] border-r border-[#2a2a2a] flex flex-col justify-between z-10 fixed md:relative bottom-0 md:bottom-auto h-16 md:h-screen">
            <div class="flex md:flex-col w-full h-full">
                <div class="hidden md:flex p-6 items-center gap-3 border-b border-[#2a2a2a]">
                    <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-bold text-white">S</div>
                    <span class="text-xl font-bold tracking-wider text-white">SQUAD<span class="text-red-500">DFC</span></span>
                </div>
                <div class="flex md:flex-col w-full justify-around md:justify-start md:mt-6 p-2 md:p-4 gap-2" id="nav-menu">
                    <!-- Nav items renderizados via JS -->
                </div>
            </div>
            <div class="hidden md:flex p-4 border-t border-[#2a2a2a]">
                <button onclick="window.appActions.logout()" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors w-full p-2">
                    <i data-lucide="log-out" class="w-5 h-5"></i><span>Sair</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto pb-20 md:pb-0 relative">
            <header class="bg-[#141414] border-b border-[#2a2a2a] p-4 flex justify-between items-center sticky top-0 z-10">
                <h1 id="header-title" class="text-xl font-semibold text-white capitalize">Dashboard</h1>
                <div class="flex items-center gap-4">
                    <input type="month" id="selected-month" class="bg-[#2a2a2a] border border-[#444] rounded px-3 py-1.5 text-sm focus:outline-none focus:border-red-500" />
                    <div id="user-avatar" class="w-8 h-8 rounded-full bg-red-900/50 border border-red-500 flex items-center justify-center text-sm font-bold text-red-200">U</div>
                </div>
            </header>

            <div class="p-4 md:p-8" id="tab-content">
                <!-- Conteúdo das abas renderizado via JS -->
            </div>
        </main>
    </div>

    <!-- MODAIS -->
    <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        
        <!-- Modal Cliente -->
        <div id="modal-client" class="hidden bg-[#141414] border border-[#333] rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl flex-col">
            <div class="p-6 border-b border-[#2a2a2a] flex justify-between items-center sticky top-0 bg-[#141414] z-10">
                <h2 id="client-modal-title" class="text-2xl font-bold text-white">Novo Cliente</h2>
                <button onclick="window.appActions.closeModal()" class="p-2 text-gray-400 hover:text-white bg-[#2a2a2a] rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 flex-1">
                <!-- Coluna 1 -->
                <div class="space-y-4">
                    <input type="hidden" id="client-id" />
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Nome do Cliente</label>
                        <input type="text" id="client-name" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none" />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Fase</label>
                            <select id="client-phase" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none">
                                <option value="Tratativa">Tratativa</option>
                                <option value="Implementação">Implementação</option>
                                <option value="Manutenção">Manutenção</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Status</label>
                            <select id="client-status" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none">
                                <option value="Ativo">Ativo</option>
                                <option value="Churn">Churn</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Fornecedor</label>
                            <input type="text" id="client-supplier" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none" />
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Sistema</label>
                            <input type="text" id="client-system" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none" />
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Tipo de Serviço</label>
                        <input type="text" id="client-serviceType" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none" />
                    </div>

                    <!-- Atribuição de Equipe -->
                    <div class="grid grid-cols-2 gap-4 mt-4 p-4 border border-[#333] rounded-lg bg-[#0a0a0a]">
                        <div class="col-span-2"><label class="block text-xs font-medium text-red-500 mb-1 uppercase tracking-wider">Responsável (Equipe)</label></div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Integrante</label>
                            <select id="client-assignedMemberId" class="w-full bg-[#141414] border border-[#333] rounded p-2 text-white focus:border-red-500 focus:outline-none">
                                <option value="">Nenhum</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">% Atribuída</label>
                            <input type="number" min="0" max="100" id="client-memberPercentage" value="100" class="w-full bg-[#141414] border border-[#333] rounded p-2 text-white focus:border-red-500 focus:outline-none" />
                        </div>
                    </div>
                </div>

                <!-- Coluna 2: Financeiro -->
                <div class="space-y-4 bg-[#1a1a1a] p-5 rounded-xl border border-[#2a2a2a]">
                    <h3 class="text-sm font-bold text-red-500 mb-4 border-b border-[#333] pb-2">Dados Financeiros</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Valor Recorrente (MRR)</label>
                            <div class="relative w-full">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                                <input type="text" id="client-recurringValue" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2 pl-9 text-white focus:border-red-500 focus:outline-none" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Margem (Auto)</label>
                            <div id="client-recurringMargin" class="w-full bg-[#0a0a0a]/50 border border-[#333] rounded p-2 text-emerald-400 font-mono">R$ 0,00</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Valor One Time</label>
                            <div class="relative w-full">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                                <input type="text" id="client-oneTimeValue" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2 pl-9 text-white focus:border-red-500 focus:outline-none" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Margem (Auto)</label>
                            <div id="client-oneTimeMargin" class="w-full bg-[#0a0a0a]/50 border border-[#333] rounded p-2 text-emerald-400 font-mono">R$ 0,00</div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-[#333]">
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Data de Entrega</label>
                        <input type="date" id="client-deliveryDate" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2 text-white focus:border-red-500 focus:outline-none" style="color-scheme: dark;" />
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase">Nota NPS</label>
                        <input type="number" max="10" min="0" id="client-nps" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2 text-white focus:border-red-500 focus:outline-none" />
                    </div>
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Observações / Motivo Churn</label>
                    <textarea id="client-observation" rows="3" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-3 text-white focus:border-red-500 focus:outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="p-6 border-t border-[#2a2a2a] bg-[#141414] flex justify-end gap-3 sticky bottom-0">
                <button onclick="window.appActions.closeModal()" class="px-5 py-2 rounded-lg font-medium text-gray-400 hover:text-white hover:bg-[#2a2a2a] transition-colors">Cancelar</button>
                <button onclick="window.appActions.saveClient()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-2 rounded-lg font-bold transition-colors shadow-lg shadow-red-900/30">Salvar Cliente</button>
            </div>
        </div>

        <!-- Modal Team -->
        <div id="modal-team" class="hidden bg-[#141414] border border-[#333] rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex-col">
            <div class="p-6 border-b border-[#2a2a2a] flex justify-between items-center">
                <h2 id="team-modal-title" class="text-xl font-bold text-white">Novo Integrante</h2>
                <button onclick="window.appActions.closeModal()" class="p-2 text-gray-400 hover:text-white bg-[#2a2a2a] rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="team-id" />
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Nome Completo</label>
                    <input type="text" id="team-name" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Cargo / Função</label>
                    <input type="text" id="team-role" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Custo Fixo Mensal (R$)</label>
                    <div class="relative w-full">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                        <input type="text" id="team-cost" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 pl-9 text-white focus:border-red-500 focus:outline-none" />
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-[#2a2a2a] bg-[#1a1a1a] flex justify-end gap-3">
                <button onclick="window.appActions.closeModal()" class="px-5 py-2 rounded-lg font-medium text-gray-400 hover:text-white hover:bg-[#2a2a2a] transition-colors">Cancelar</button>
                <button onclick="window.appActions.saveTeam()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-2 rounded-lg font-bold transition-colors shadow-lg shadow-red-900/30">Salvar</button>
            </div>
        </div>

        <!-- Modal History -->
        <div id="modal-history" class="hidden bg-[#141414] border border-[#333] rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex-col">
            <div class="p-6 border-b border-[#2a2a2a] flex justify-between items-center">
                <h2 id="history-modal-title" class="text-xl font-bold text-white">Adicionar Mês ao Histórico</h2>
                <button onclick="window.appActions.closeModal()" class="p-2 text-gray-400 hover:text-white bg-[#2a2a2a] rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Mês de Referência</label>
                    <input type="month" id="history-month" class="w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 text-white focus:border-red-500 focus:outline-none disabled:opacity-50" />
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">MRR Bruto (R$)</label>
                        <div class="relative w-full">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                            <input type="text" id="history-mrr" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 pl-9 text-white focus:border-red-500 focus:outline-none" />
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-red-500 mb-1 uppercase tracking-wider">Margem MC (R$)</label>
                        <div class="relative w-full">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                            <input type="text" id="history-margin" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 pl-9 text-white border-red-500/30 focus:border-red-500 focus:outline-none" />
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Custos Totais</label>
                    <div class="relative w-full">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium pointer-events-none">R$</span>
                        <input type="text" id="history-cost" class="currency-mask w-full bg-[#0a0a0a] border border-[#333] rounded p-2.5 pl-9 text-white focus:border-red-500 focus:outline-none" />
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-[#2a2a2a] bg-[#1a1a1a] flex justify-end gap-3">
                <button onclick="window.appActions.closeModal()" class="px-5 py-2 rounded-lg font-medium text-gray-400 hover:text-white hover:bg-[#2a2a2a] transition-colors">Cancelar</button>
                <button onclick="window.appActions.saveHistory()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-2 rounded-lg font-bold transition-colors shadow-lg shadow-red-900/30">Salvar Histórico</button>
            </div>
        </div>

    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, query, addDoc, updateDoc, deleteDoc, where } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Inicialização do Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'squad-dfc-app';

        // Estado Global
        const state = {
            user: null,
            activeTab: 'dashboard',
            clients: [], transactions: [], team: [], closures: [],
            selectedMonth: (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; })(),
            clientFilter: 'Todos'
        };

        // Utilitários Financeiros
        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
        const formatNumberToBR = (val) => (Number(val) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const calcMargin = (val) => val ? (val * 0.7075) * 0.35 : 0;

        // Máscaras de Moeda (DOM Setup)
        function setupCurrencyMasks() {
            document.querySelectorAll('.currency-mask').forEach(input => {
                input.addEventListener('input', (e) => {
                    let val = e.target.value.replace(/\D/g, '');
                    if (val === '') { 
                        e.target.dataset.value = 0; 
                        e.target.value = ''; 
                    } else {
                        let num = Number(val) / 100;
                        e.target.dataset.value = num;
                        e.target.value = formatNumberToBR(num);
                    }
                    // Atualizar margem no form de clientes se for campo de valor
                    if(input.id === 'client-recurringValue') {
                        document.getElementById('client-recurringMargin').innerText = formatCurrency(calcMargin(Number(input.dataset.value)));
                    }
                    if(input.id === 'client-oneTimeValue') {
                        document.getElementById('client-oneTimeMargin').innerText = formatCurrency(calcMargin(Number(input.dataset.value)));
                    }
                });
            });
        }
        function setCurrencyInput(id, value) {
            const el = document.getElementById(id);
            if(el) {
                el.dataset.value = value || 0;
                el.value = formatNumberToBR(value);
            }
        }
        function getCurrencyInput(id) {
            const el = document.getElementById(id);
            return el ? Number(el.dataset.value || 0) : 0;
        }

        // Sistema de Renderização
        function renderNav() {
            const tabs = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
                { id: 'clients', icon: 'users', label: 'Clientes' },
                { id: 'team', icon: 'briefcase', label: 'Equipe' },
                { id: 'closure', icon: 'calculator', label: 'Fechamento' },
                { id: 'history', icon: 'history', label: 'Histórico Anual' }
            ];
            document.getElementById('nav-menu').innerHTML = tabs.map(t => `
                <button onclick="window.appActions.changeTab('${t.id}')" class="flex items-center gap-3 w-full p-3 rounded-lg transition-all ${state.activeTab === t.id ? 'bg-red-600 text-white font-medium shadow-lg shadow-red-900/20' : 'text-gray-400 hover:bg-[#2a2a2a] hover:text-white'}">
                    <i data-lucide="${t.icon}" class="w-5 h-5"></i><span class="hidden md:block">${t.label}</span>
                </button>
            `).join('');
            document.getElementById('header-title').innerText = tabs.find(t => t.id === state.activeTab).label;
        }

        function renderContent() {
            const content = document.getElementById('tab-content');
            if (state.activeTab === 'dashboard') content.innerHTML = getDashboardHTML();
            if (state.activeTab === 'clients') content.innerHTML = getClientsHTML();
            if (state.activeTab === 'team') content.innerHTML = getTeamHTML();
            if (state.activeTab === 'closure') content.innerHTML = getClosureHTML();
            if (state.activeTab === 'history') content.innerHTML = getHistoryHTML();
            lucide.createIcons();
        }

        function updateApp() {
            renderNav();
            renderContent();
            setupCurrencyMasks();
        }

        // --- GERAÇÃO DE HTML DAS ABAS ---
        function getDashboardHTML() {
            const activeC = state.clients.filter(c => c.status !== 'Churn');
            const prevMRR = activeC.reduce((a, c) => a + Number(c.recurringValue || 0), 0);
            const prevOT = activeC.reduce((a, c) => a + Number(c.oneTimeValue || 0), 0);
            
            const moTrans = state.transactions.filter(t => t.month === state.selectedMonth);
            const realMRR = moTrans.filter(t => t.type === 'recorrente').reduce((a, c) => a + c.value, 0);
            const realOT = moTrans.filter(t => t.type === 'onetime').reduce((a, c) => a + c.value, 0);
            const realMargin = moTrans.reduce((a, c) => a + c.marginValue, 0);

            const cFixo = state.team.reduce((a, c) => a + Number(c.cost || 0), 0);
            const cVar = 400; // Terceiros
            const lucro = realMargin - (cFixo + cVar);

            const barRecPercent = prevMRR > 0 ? Math.min(100, Math.round((realMRR / prevMRR) * 100)) : 0;
            const barOTPercent = prevOT > 0 ? Math.min(100, Math.round((realOT / prevOT) * 100)) : 0;

            return `

                            <div class="text-3xl font-bold ${lucro >= 0 ? 'text-emerald-500' : 'text-red-500'}">${formatCurrency(lucro)}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-[#141414] border border-[#2a2a2a] rounded-xl p-6">

                            <div class="space-y-4">
                                <div><div class="flex justify-between text-sm mb-1"><span class="text-gray-300">MRR (Recorrente)</span><span class="text-gray-400">${formatCurrency(realMRR)} / ${formatCurrency(prevMRR)}</span></div><div class="h-2 w-full bg-[#2a2a2a] rounded-full overflow-hidden"><div class="h-full bg-red-600 transition-all" style="width: ${barRecPercent}%"></div></div></div>
                                <div><div class="flex justify-between text-sm mb-1"><span class="text-gray-300">Projetos (One Time)</span><span class="text-gray-400">${formatCurrency(realOT)} / ${formatCurrency(prevOT)}</span></div><div class="h-2 w-full bg-[#2a2a2a] rounded-full overflow-hidden"><div class="h-full bg-red-600 transition-all" style="width: ${barOTPercent}%"></div></div></div>
                            </div>
                        </div>

                            <h3 class="text-lg font-semibold mb-4">Fluxo de Caixa Simplificado</h3>

                                <div class="flex justify-between items-center pt-2 text-lg"><span class="font-bold text-white">Resultado</span><span class="font-bold ${lucro >= 0 ? 'text-emerald-500' : 'text-red-500'}">${formatCurrency(lucro)}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getClosureHTML() {
            const moTrans = state.transactions.filter(t => t.month === state.selectedMonth);
            const isLocked = state.closures.some(c => c.month === state.selectedMonth && c.locked);
            
            let html = `
                <div class="bg-[#141414] border border-[#2a2a2a] rounded-xl overflow-hidden relative">
                    <div class="p-6 border-b border-[#2a2a2a] bg-[#1a1a1a] flex justify-between items-center">

                        ${isLocked ? `<div class="bg-red-900/30 text-red-400 border border-red-500/50 px-3 py-1 rounded text-sm font-bold flex items-center gap-2"><i data-lucide="check-circle-2" class="w-4 h-4"></i> Travado</div>` : ''}
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead><tr class="bg-[#0a0a0a] border-b border-[#2a2a2a] text-xs uppercase text-gray-500">
                                <th class="p-4 font-medium">Cliente</th><th class="p-4">Previsto MRR</th><th class="p-4">Realizado MRR</th>
                                <th class="p-4">Previsto O.T.</th><th class="p-4">Realizado O.T.</th><th class="p-4">Margem MC Total</th><th class="p-4 text-center">Status</th>
                            </tr></thead>
                            <tbody class="divide-y divide-[#2a2a2a]">
            `;

            state.clients.filter(c => c.status !== 'Churn' || (c.status === 'Churn' && moTrans.some(t => t.clientId === c.id))).forEach(client => {
                const cTrans = moTrans.filter(t => t.clientId === client.id);
                const recT = cTrans.find(t => t.type === 'recorrente');
                const otT = cTrans.find(t => t.type === 'onetime');
                const pR = Number(client.recurringValue||0), pO = Number(client.oneTimeValue||0);
                const rR = recT?recT.value:0, rO = otT?otT.value:0;
                const mTotal = (recT?recT.marginValue:0) + (otT?otT.marginValue:0);
                const isPaid = (pR===0 || rR>0) && (pO===0 || rO>0);
                const isPend = (pR>0 && rR===0) || (pO>0 && rO===0);
                
                html += `
                    <tr class="hover:bg-[#1a1a1a] text-sm">
                        <td class="p-4 font-medium text-white">${client.name} ${client.status==='Churn'?'<span class="text-red-500 text-xs ml-2">(Churn)</span>':''}</td>
                        <td class="p-4 text-gray-400">${formatCurrency(pR)}</td>
                        <td class="p-4 ${rR>0?'text-emerald-400':'text-gray-600'}">${formatCurrency(rR)}</td>
                        <td class="p-4 text-gray-400">${formatCurrency(pO)}</td>
                        <td class="p-4 ${rO>0?'text-emerald-400':'text-gray-600'}">${formatCurrency(rO)}</td>
                        <td class="p-4 text-red-400 font-bold">${formatCurrency(mTotal)}</td>
                        <td class="p-4 text-center">${isPaid &&(pR>0||pO>0)?'<span class="bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded text-xs">Ok</span>' : isPend ? '<span class="bg-amber-500/10 text-amber-500 px-2 py-1 rounded text-xs">Pendente</span>' : '-'}</td>
                    </tr>
                `;
            });
            html += `</tbody></table></div>
                <div class="p-6 bg-[#0a0a0a] border-t border-[#2a2a2a] flex justify-end gap-4 items-center">
                    <span id="lock-msg" class="text-emerald-400 text-sm font-medium hidden">Salvo no Histórico!</span>
                    <button onclick="window.appActions.lockMonth()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-medium flex items-center gap-2"><i data-lucide="save" class="w-4 h-4"></i> ${isLocked ? 'Atualizar Travamento' : 'Travar Mês'}</button>
                </div></div>`;
            return html;
        }

        // --- AÇÕES DO APLICATIVO ---
        window.appActions = {

                    document.getElementById('client-recurringMargin').innerText = 'R$ 0,00';

            saveClient: async () => {

                const data = {
                    name: document.getElementById('client-name').value,
                    phase: document.getElementById('client-phase').value,
                    status: document.getElementById('client-status').value,
                    supplier: document.getElementById('client-supplier').value,
                    system: document.getElementById('client-system').value,
                    serviceType: document.getElementById('client-serviceType').value,
                    assignedMemberId: document.getElementById('client-assignedMemberId').value,

                    nps: document.getElementById('client-nps').value,
                    observation: document.getElementById('client-observation').value
                };
                const cid = document.getElementById('client-id').value;
                try {
                    if (cid) await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'clients', cid), data);
                    else await addDoc(collection(db, 'artifacts', appId, 'users', state.user.uid, 'clients'), { ...data, createdAt: new Date().toISOString() });
                    window.appActions.closeModal();
                } catch(e) { console.error(e); }
            },

            openTeamModal: (id = null) => {
                const modal = document.getElementById('modal-team');
                if(id) {
                    const member = state.team.find(m => m.id === id);
                    document.getElementById('team-modal-title').innerText = 'Editar Integrante';
                    document.getElementById('team-id').value = member.id;
                    document.getElementById('team-name').value = member.name || '';
                    document.getElementById('team-role').value = member.role || '';
                    setCurrencyInput('team-cost', member.cost);
                } else {
                    document.getElementById('team-modal-title').innerText = 'Novo Integrante';
                    document.getElementById('team-id').value = '';
                    document.getElementById('team-name').value = '';
                    document.getElementById('team-role').value = '';
                    setCurrencyInput('team-cost', 0);
                }
                document.getElementById('modal-backdrop').classList.remove('hidden');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            },

            saveTeam: async () => {
                if(!state.user) return;
                const data = {
                    name: document.getElementById('team-name').value,
                    role: document.getElementById('team-role').value,
                    cost: getCurrencyInput('team-cost')
                };
                const mid = document.getElementById('team-id').value;
                try {
                    if (mid) await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'team', mid), data);
                    else await addDoc(collection(db, 'artifacts', appId, 'users', state.user.uid, 'team'), { ...data, createdAt: new Date().toISOString() });
                    window.appActions.closeModal();
                } catch(e) { console.error(e); }
            },
            
            deleteTeam: async (id) => {
                if(!state.user) return;
                try { await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'team', id)); } catch(e) { console.error(e); }
            },

            openHistoryModal: (month = null) => {
                const modal = document.getElementById('modal-history');
                const monthInput = document.getElementById('history-month');
                if(month) {
                    const closure = state.closures.find(c => c.month === month);
                    document.getElementById('history-modal-title').innerText = 'Editar Histórico';
                    monthInput.value = closure.month;
                    monthInput.disabled = true;
                    setCurrencyInput('history-mrr', closure.mrrBrutoRealizado);
                    setCurrencyInput('history-margin', closure.margemTotalRealizada);
                    setCurrencyInput('history-cost', closure.custosTotais);
                } else {
                    document.getElementById('history-modal-title').innerText = 'Adicionar Mês';
                    monthInput.value = '';
                    monthInput.disabled = false;
                    setCurrencyInput('history-mrr', 0);
                    setCurrencyInput('history-margin', 0);
                    setCurrencyInput('history-cost', 0);
                }
                document.getElementById('modal-backdrop').classList.remove('hidden');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            },

            saveHistory: async () => {
                if(!state.user) return;
                const data = {
                    month: document.getElementById('history-month').value,
                    mrrBrutoRealizado: getCurrencyInput('history-mrr'),
                    margemTotalRealizada: getCurrencyInput('history-margin'),
                    custosTotais: getCurrencyInput('history-cost'),
                };
                if(!data.month) return;
                data.lucroLiquido = data.margemTotalRealizada - data.custosTotais;
                data.locked = true;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'monthly_closures', data.month), { ...data, updatedAt: new Date().toISOString() }, { merge: true });
                    window.appActions.closeModal();
                } catch(e) { console.error(e); }
            },

            darBaixa: async (clientId, clientName, value, type) => {
                if(!state.user) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', state.user.uid, 'transactions'), {
                        clientId, clientName, month: state.selectedMonth, value: Number(value), marginValue: calcMargin(Number(value)), type, createdAt: new Date().toISOString()
                    });
                } catch(e) { console.error(e); }
            },

            removeBaixa: async (tid) => {
                if(!state.user) return;
                try { await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'transactions', tid)); } catch(e) { console.error(e); }
            },

            lockMonth: async () => {
                if(!state.user) return;
                const moTrans = state.transactions.filter(t => t.month === state.selectedMonth);
                let tPrevRec=0, tRealRec=0, tMargin=0;
                
                state.clients.filter(c => c.status !== 'Churn' || (c.status === 'Churn' && moTrans.some(t => t.clientId === c.id))).forEach(client => {
                    const cTrans = moTrans.filter(t => t.clientId === client.id);
                    const recT = cTrans.find(t => t.type === 'recorrente');
                    const otT = cTrans.find(t => t.type === 'onetime');
                    tRealRec += recT?recT.value:0;
                    tMargin += (recT?recT.marginValue:0) + (otT?otT.marginValue:0);
                });

                const cFixo = state.team.reduce((a, c) => a + Number(c.cost||0), 0);
                const cTotal = cFixo + 400; // 400 = fixo base terceiros, adaptável depois
                const data = { month: state.selectedMonth, mrrBrutoRealizado: tRealRec, margemTotalRealizada: tMargin, custosTotais: cTotal, lucroLiquido: tMargin - cTotal, locked: true };

                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'monthly_closures', data.month), { ...data, updatedAt: new Date().toISOString() }, { merge: true });
                    const msg = document.getElementById('lock-msg');
                    if(msg) { msg.classList.remove('hidden'); setTimeout(()=>msg.classList.add('hidden'), 3000); }
                } catch(e) { console.error(e); }
            },

            logout: () => signOut(auth)
        };

        // UI Event Listeners base
        document.getElementById('selected-month').addEventListener('change', (e) => {
            state.selectedMonth = e.target.value;
            updateApp();
        });
        document.getElementById('selected-month').value = state.selectedMonth;

        // Listener de Autenticação
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        document.getElementById('btn-login').addEventListener('click', () => { window.location.reload(); }); // Botão aciona reload onde o script tenta Auth custom/anon novamento, padrão do Canvas

        let unsubListeners = [];
        onAuthStateChanged(auth, (user) => {
            state.user = user;
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                
                unsubListeners.forEach(fn => fn()); unsubListeners = [];
                
                // Firestore Listeners
                unsubListeners.push(onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'clients'), s => { state.clients = s.docs.map(d => ({id: d.id, ...d.data()})); updateApp(); }));
                unsubListeners.push(onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'transactions'), s => { state.transactions = s.docs.map(d => ({id: d.id, ...d.data()})); updateApp(); }));
                unsubListeners.push(onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'team'), s => { state.team = s.docs.map(d => ({id: d.id, ...d.data()})); updateApp(); }));
                unsubListeners.push(onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'monthly_closures'), s => { 
                    state.closures = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.month.localeCompare(a.month)); 
                    updateApp(); 
                }));
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        initAuth();
    </script>
</body>
</html>
